{% set page_title = 'All pages — ' ~ wiki_title %}{% include '_header.html' %}
  <body>
    {% include '_navbar.html' %}
    {% include '_drawer.html' %}
    <main class="main">
      <div class="index">
        <h1>All pages</h1>
        <input class="index__filter" type="search" placeholder="Filter…" data-index-filter aria-label="Filter pages">
        <ul class="index__list" data-index-list>
          {% for page in pages %}
          <li class="index__row" data-index-row data-search-text="{{page.title|lower}} {{page.author|lower}}">
            <a href="{{ page.path }}">{{page.title}}</a>
            <span class="index__meta">{{page.date}}</span>
          </li>
          {%- endfor -%}
        </ul>
      </div>
    </main>
    {% include '_footer.html' %}
  </body>
</html>
